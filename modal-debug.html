<!DOCTYPE html>
<html>
<head>
  <title>Modal Debug</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #1a1a1a; color: #fff; }
    #status { padding: 20px; background: #222; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Modal Debug</h1>
  <button onclick="checkModals()">Check Modals</button>
  <div id="status">Click button to check</div>

  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/players.js"></script>
  <script src="js/tournament.js"></script>
  <script src="js/sorteio.js"></script>
  <script src="js/app.js"></script>

  <script>
    function checkModals() {
      const status = document.getElementById('status');
      const modals = document.querySelectorAll('.modal-backdrop');
      let output = 'Checking modals:\n\n';
      
      modals.forEach((modal, i) => {
        const id = modal.id || 'unnamed-' + i;
        const hidden = modal.classList.contains('hidden') ? 'HIDDEN ✓' : '⚠️ VISIBLE';
        output += `${id}: ${hidden}\n`;
      });
      
      status.innerHTML = output;
    }
    
    // Auto-check on load
    setTimeout(checkModals, 1000);
  </script>
</body>
</html>
