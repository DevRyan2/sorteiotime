<!DOCTYPE html>
<html>
<head>
  <title>Click Test</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #1a1a1a; color: #fff; }
    button { padding: 10px 20px; background: #25D366; color: #000; border: none; border-radius: 5px; cursor: pointer; margin: 10px 0; }
    button:active { background: #1a9a4a; }
    #status { padding: 20px; background: #222; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Click Test</h1>
  <button onclick="clicked()">Test Click</button>
  <button onclick="testFirebase()">Test Firebase</button>
  <button onclick="testStorage()">Test Storage</button>
  
  <div id="status">
    <p>Waiting for interaction...</p>
  </div>

  <script>
    function clicked() {
      document.getElementById('status').innerHTML = '<p style="color: #25D366;">✅ Click worked!</p>';
    }
    
    function testFirebase() {
      document.getElementById('status').innerHTML = '<p>Testing Firebase...</p>';
      try {
        const test = window.FIREBASE_CONFIG;
        if (test) {
          document.getElementById('status').innerHTML = '<p style="color: #25D366;">✅ Firebase config exists</p>';
        } else {
          document.getElementById('status').innerHTML = '<p style="color: #ff4d6d;">❌ Firebase config is null</p>';
        }
      } catch(e) {
        document.getElementById('status').innerHTML = '<p style="color: #ff4d6d;">❌ Error: ' + e.message + '</p>';
      }
    }
    
    function testStorage() {
      document.getElementById('status').innerHTML = '<p>Testing Storage...</p>';
      try {
        const players = Storage.getPlayers();
        document.getElementById('status').innerHTML = '<p style="color: #25D366;">✅ Storage works. Players count: ' + Object.keys(players).length + '</p>';
      } catch(e) {
        document.getElementById('status').innerHTML = '<p style="color: #ff4d6d;">❌ Error: ' + e.message + '</p>';
      }
    }
  </script>

  <!-- Load main app files -->
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/players.js"></script>
  <script src="js/tournament.js"></script>
  <script src="js/sorteio.js"></script>
  <script src="js/app.js"></script>

  <script>
    document.getElementById('status').innerHTML = '<p style="color: #25D366;">✅ All scripts loaded successfully!</p>';
  </script>
</body>
</html>
